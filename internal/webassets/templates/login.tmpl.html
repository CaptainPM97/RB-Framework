<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – {{.Branding.AppName}}</title>
<link rel="stylesheet" href="{{asset "css/style.css"}}">
<style>
:root {
    --primary: {{.Theme.Primary}};
    --bg-gradient-start: {{.Theme.BgGradientStart}};
    --bg-gradient-end: {{.Theme.BgGradientEnd}};
    --text-main: {{.Theme.TextMain}};
    --text-muted: {{.Theme.TextMuted}};
    --text-dark: {{.Theme.TextDark}};
}
</style>
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="logo-icon" style="margin: 0 auto 16px auto;">{{.Branding.LogoInitials}}</div>
        <h1 class="auth-title">{{.Branding.AppName}}</h1>
        <p class="auth-subtitle">Bitte melde dich an, um fortzufahren.</p>

        {{if .Error}}
            <div class="auth-error">{{.Error}}</div>
        {{end}}

        <form method="post" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <div class="form-row">
                <label class="contact-label">Benutzername</label>
                <input type="text" name="username" class="text-input" autocomplete="username" required autofocus>
            </div>
            <div class="form-row">
                <label class="contact-label">Passwort</label>
                <input type="password" name="password" class="text-input" autocomplete="current-password" required>
            </div>
            <button type="submit" class="submit-request-btn">Anmelden</button>
        </form>
    </div>
</body>
</html>
